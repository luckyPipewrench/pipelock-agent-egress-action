name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run ShellCheck on src/
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        env:
          # SC2024: "sudo doesn't affect redirects" — the redirects in src/run.sh
          # write keygen / verify-receipt / pipelock-run output to wrapping-user-owned
          # temp files on purpose; sudo elevates only the command. Excluding the check
          # globally is acceptable because every existing case is intentional, and
          # this repo does not otherwise create root-owned files via sudo redirect.
          SHELLCHECK_OPTS: --exclude=SC2024
        with:
          severity: warning
          scandir: ./src

  ruby-syntax:
    name: Ruby syntax check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.x latest
        with:
          ruby-version: "4.0.5"

      - name: Syntax check materialize-config.rb
        run: ruby -c src/materialize-config.rb

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Run actionlint
        run: |
          set -euo pipefail
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/011a6d15e749bb3f2d771eed9c7aa0e7e3e10ee7/scripts/download-actionlint.bash)
          ./actionlint -color
