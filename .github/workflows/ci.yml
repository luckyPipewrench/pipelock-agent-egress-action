name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Checkout Pipelock
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          repository: luckyPipewrench/pipelock
          ref: v2.4.0
          path: pipelock-src

      - name: Checkout Pipelock SDK
        # Pinned to the merge commit of pipelock#498 (Audit Packet v0 schema
        # publication). Bump to a release tag once a tagged pipelock cuts the
        # SDK package; v2.4.0 predates the SDK, hence the separate checkout.
        # fetch-depth: 0 because GitHub's default --depth=1 cannot resolve a
        # raw SHA that is not a branch/tag tip.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          repository: luckyPipewrench/pipelock
          ref: 36f95853453755cdb86fc4df1aa952a34c34bd1d
          path: pipelock-sdk-src
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: pipelock-src/go.mod
          cache-dependency-path: pipelock-src/go.sum

      - name: Build Pipelock
        run: go build -o "$RUNNER_TEMP/pipelock" ./cmd/pipelock
        working-directory: pipelock-src

      - name: Build Audit Packet validator
        # The SDK's Go binding enforces the v0 schema PLUS the
        # totals-sum-equals-receipt-count and asymmetric trust invariants the
        # JSON Schema cannot express. Round-tripping each emitted packet
        # through this binding is the canonical conformance check.
        working-directory: pipelock-sdk-src
        run: |
          set -euo pipefail
          mkdir -p cmd/audit-packet-validator
          cat >cmd/audit-packet-validator/main.go <<'GO'
          package main

          import (
            "encoding/json"
            "fmt"
            "os"

            auditpacket "github.com/luckyPipewrench/pipelock/sdk/audit-packet"
          )

          func main() {
            if len(os.Args) < 2 {
              fmt.Fprintln(os.Stderr, "usage: audit-packet-validator <packet.json> [packet.json...]")
              os.Exit(64)
            }
            rc := 0
            for _, path := range os.Args[1:] {
              data, err := os.ReadFile(path)
              if err != nil {
                fmt.Fprintf(os.Stderr, "%s: read: %v\n", path, err)
                rc = 1
                continue
              }
              var p auditpacket.Packet
              if err := json.Unmarshal(data, &p); err != nil {
                fmt.Fprintf(os.Stderr, "%s: unmarshal: %v\n", path, err)
                rc = 1
                continue
              }
              if err := p.Validate(); err != nil {
                fmt.Fprintf(os.Stderr, "%s: validate: %v\n", path, err)
                rc = 1
                continue
              }
              fmt.Printf("%s: ok (verdict=%s trusted=%t receipts=%d)\n",
                path, p.Verifier.Verdict, p.Verifier.Trusted, p.Summary.ReceiptCount)
            }
            os.Exit(rc)
          }
          GO
          go build -o "$RUNNER_TEMP/audit-packet-validator" ./cmd/audit-packet-validator

      - name: Generate receipt signer
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/pipelock" keygen ci --keystore "$RUNNER_TEMP/pipelock-keys" --force

      - name: Write Pipelock config
        run: |
          set -euo pipefail
          mkdir -p .pipelock
          cat >.pipelock/ci.yaml <<'YAML'
          version: 1
          mode: balanced
          logging:
            include_allowed: true
          fetch_proxy:
            listen: "127.0.0.1:1"
            timeout_seconds: 17
            max_response_mb: 23
          forward_proxy:
            enabled: false
          websocket_proxy:
            enabled: false
          flight_recorder:
            enabled: false
            dir: /tmp/not-action-evidence
            signing_key_path: /tmp/not-action-key
          YAML

      - name: Test config materializer
        run: |
          set -euo pipefail
          src/materialize-config.rb \
            --input .pipelock/ci.yaml \
            --output "$RUNNER_TEMP/materialized.yaml" \
            --agent-identity ci-agent \
            --listen 10.99.88.1:8888 \
            --evidence-dir /tmp/action-evidence \
            --signing-key-path /tmp/action-key
          ruby - "$RUNNER_TEMP/materialized.yaml" <<'RUBY'
          require "yaml"

          cfg = YAML.load_file(ARGV.fetch(0))
          abort "caller policy not preserved" unless cfg.dig("logging", "include_allowed") == true
          abort "identity not forced" unless cfg["default_agent_identity"] == "ci-agent"
          abort "identity binding not forced" unless cfg["bind_default_agent_identity"] == true
          abort "listen not forced" unless cfg.dig("fetch_proxy", "listen") == "10.99.88.1:8888"
          abort "fetch timeout not preserved" unless cfg.dig("fetch_proxy", "timeout_seconds") == 17
          abort "fetch max response not preserved" unless cfg.dig("fetch_proxy", "max_response_mb") == 23
          abort "forward proxy not forced" unless cfg.dig("forward_proxy", "enabled") == true
          abort "websocket proxy not forced" unless cfg.dig("websocket_proxy", "enabled") == true
          abort "recorder not forced" unless cfg.dig("flight_recorder", "enabled") == true
          abort "recorder dir not forced" unless cfg.dig("flight_recorder", "dir") == "/tmp/action-evidence"
          abort "signing key not forced" unless cfg.dig("flight_recorder", "signing_key_path") == "/tmp/action-key"
          RUBY

      - name: Write smoke scripts
        run: |
          set -euo pipefail
          mkdir -p ci
          cat >ci/egress-smoke.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          fail() {
            echo "$1" >&2
            exit 2
          }

          if env -u HTTP_PROXY -u HTTPS_PROXY -u http_proxy -u https_proxy \
            curl --noproxy '*' -fsS --max-time 5 http://example.com >/dev/null 2>&1; then
            fail "direct HTTP egress unexpectedly succeeded"
          fi

          if timeout 5 getent hosts example.com >/dev/null 2>&1; then
            fail "direct DNS lookup unexpectedly succeeded"
          fi

          if timeout 5 bash -c '</dev/tcp/1.1.1.1/80' >/dev/null 2>&1; then
            fail "raw TCP egress unexpectedly succeeded"
          fi

          if sudo -n true >/dev/null 2>&1; then
            fail "sudo unexpectedly succeeded"
          fi

          if sudo -n nsenter -t 1 -n true >/dev/null 2>&1; then
            fail "sudo nsenter unexpectedly succeeded"
          fi

          if sudo -n iptables -F >/dev/null 2>&1; then
            fail "sudo iptables unexpectedly succeeded"
          fi

          if sudo -n killall pipelock >/dev/null 2>&1; then
            fail "sudo killall unexpectedly succeeded"
          fi

          if sudo -n umount /var/run/docker.sock >/dev/null 2>&1; then
            fail "sudo umount unexpectedly succeeded"
          fi

          if [[ -S /var/run/docker.sock ]]; then
            fail "Docker socket is visible inside the boundary"
          fi

          if command -v getpcaps >/dev/null 2>&1; then
            caps="$(getpcaps $$ 2>/dev/null || true)"
            if grep -Eq 'cap_[a-z0-9_]+' <<<"$caps"; then
              echo "$caps" >&2
              fail "capability set is not empty"
            fi
          fi

          curl -fsS --max-time 20 http://example.com >/dev/null
          SH
          chmod +x ci/egress-smoke.sh

          cat >ci/noop.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          true
          SH
          chmod +x ci/noop.sh

      - name: Run proxied smoke
        id: smoke
        uses: ./
        with:
          script-path: ci/egress-smoke.sh
          pipelock-bin: ${{ runner.temp }}/pipelock
          signer-private-key-path: ${{ runner.temp }}/pipelock-keys/agents/ci/id_ed25519
          signer-public-key: ${{ runner.temp }}/pipelock-keys/agents/ci/id_ed25519.pub
          audit-packet-dir: smoke-audit-packet

      - name: Assert smoke verdict
        run: |
          set -euo pipefail
          test "${{ steps.smoke.outputs['verifier-verdict'] }}" = "valid"
          test "${{ steps.smoke.outputs['receipt-count'] }}" -gt 0
          test -s smoke-audit-packet/packet.json
          test -s smoke-audit-packet/summary.md
          ruby -rjson <<'RUBY'
          require "time"

          packet = JSON.parse(File.read("smoke-audit-packet/packet.json"))

          abort "schema_version mismatch: #{packet['schema_version']}" unless packet["schema_version"] == "pipelock.audit_packet.v0"

          %w[run policy summary verifier posture artifacts generated_at].each do |k|
            abort "missing top-level #{k}" unless packet.key?(k)
          end

          # Top-level may not contain the legacy flat fields (would fail
          # additionalProperties: false in v0.json).
          %w[receipt_count totals policy_hashes transports].each do |k|
            abort "legacy flat #{k} leaked into top-level" if packet.key?(k)
          end

          run_block = packet.fetch("run")
          abort "provider should be github_actions on hosted runner: #{run_block['provider']}" unless run_block["provider"] == "github_actions"
          abort "agent_identity not stamped" unless run_block["agent_identity"] == "github-actions-agent"
          Time.iso8601(run_block.fetch("started_at"))
          Time.iso8601(run_block.fetch("completed_at"))
          abort "repository not recorded" if run_block["repository"].to_s.empty?
          abort "sha not recorded" if run_block["sha"].to_s.empty?

          policy_block = packet.fetch("policy")
          abort "policy_hashes must be an array" unless policy_block["policy_hashes"].is_a?(Array)

          summary = packet.fetch("summary")
          abort "summary.receipt_count missing" unless summary["receipt_count"].is_a?(Integer)
          totals = summary.fetch("totals")
          %w[allow block warn ask strip forward redirect other].each do |bucket|
            abort "totals missing #{bucket}" unless totals.key?(bucket)
          end
          totals_sum = totals.values.map(&:to_i).sum
          abort "totals sum #{totals_sum} != receipt_count #{summary['receipt_count']}" unless totals_sum == summary["receipt_count"].to_i

          verifier = packet.fetch("verifier")
          abort "verdict should be valid: #{verifier['verdict']}" unless verifier["verdict"] == "valid"
          abort "trusted should be true when verdict=valid" unless verifier["trusted"] == true
          abort "signer_key required when trusted=true" if verifier["signer_key"].to_s.empty?

          posture = packet.fetch("posture")
          abort "host user not recorded" unless posture["host_user"] == "pipelock-host"
          abort "host uid is root" unless posture["host_uid"].to_i > 0
          %w[raw_socket_status docker_socket_status dns_udp_status browser_proxy_status websocket_frame_scanning].each do |k|
            abort "posture #{k} missing" if posture[k].to_s.empty?
          end
          abort "unsupported_paths must be a non-empty array" unless posture["unsupported_paths"].is_a?(Array) && !posture["unsupported_paths"].empty?
          RUBY
          "$RUNNER_TEMP/audit-packet-validator" smoke-audit-packet/packet.json

      - name: Reject script path traversal
        id: traversal
        uses: ./
        continue-on-error: true
        with:
          script-path: ../../../../etc/passwd
          pipelock-bin: ${{ runner.temp }}/pipelock
          signer-private-key-path: ${{ runner.temp }}/pipelock-keys/agents/ci/id_ed25519
          signer-public-key: ${{ runner.temp }}/pipelock-keys/agents/ci/id_ed25519.pub
          audit-packet-dir: traversal-audit-packet
          fail-on-verifier-error: "false"

      - name: Assert traversal rejected
        run: |
          set -euo pipefail
          test "${{ steps.traversal.outcome }}" = "failure"

      - name: Run empty-chain check
        id: empty
        uses: ./
        with:
          script-path: ci/noop.sh
          pipelock-bin: ${{ runner.temp }}/pipelock
          signer-private-key-path: ${{ runner.temp }}/pipelock-keys/agents/ci/id_ed25519
          signer-public-key: ${{ runner.temp }}/pipelock-keys/agents/ci/id_ed25519.pub
          audit-packet-dir: empty-audit-packet
          fail-on-verifier-error: "false"

      - name: Assert empty-chain verdict
        run: |
          set -euo pipefail
          test "${{ steps.empty.outputs['verifier-verdict'] }}" = "error"
          test "${{ steps.empty.outputs['receipt-count'] }}" = "0"
          test -s empty-audit-packet/packet.json
          test -s empty-audit-packet/summary.md
          ruby -rjson <<'RUBY'
          packet = JSON.parse(File.read("empty-audit-packet/packet.json"))
          verifier = packet.fetch("verifier")
          abort "empty-chain verdict must be error: #{verifier['verdict']}" unless verifier["verdict"] == "error"
          abort "empty-chain trusted must be false" if verifier["trusted"] != false
          abort "empty-chain must omit signer_key" if verifier.key?("signer_key")
          summary = packet.fetch("summary")
          abort "empty-chain receipt_count must be 0" unless summary["receipt_count"].to_i == 0
          totals = summary.fetch("totals")
          abort "empty-chain totals must sum to 0" unless totals.values.map(&:to_i).sum == 0
          RUBY
          "$RUNNER_TEMP/audit-packet-validator" empty-audit-packet/packet.json
