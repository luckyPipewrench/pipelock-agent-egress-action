version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      ci-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - github-actions
